<div class="insert-agent-button" (click)="openInsertAgente()">
  <div class="icon-container">
    <img src="/profile/agente.png" alt="Inserisci Agente" class="icon" />
  </div>
  <div class="text-container">
    <h3>Inserisci Agente</h3>
    <p>Inserisci un agente all'interno del sito</p>
  </div>
</div>

<modal-profile [isOpen]="showInsertAgente" (close)="closeInsertAgente()" popUpName="Inserimento Agente">
  <div class="pop-up-scroll">
    <div class="input-form">
      <form [formGroup]="agenteForm" (ngSubmit)="inserisciAgente()">
      
        <div class="input-container">
          <input type="text"  class="input-field" formControlName="nome" required>
          <label for="nome" class="input-label">Nome</label>
        </div>

        <div class="input-container">
          <input type="text" class="input-field" formControlName="cognome" required>
          <label for="cognome" class="input-label">Cognome</label>
        </div>
          
        <div class="input-container">
          <input type="date" class="input-field" formControlName="dataNascita"  placeholder=" " [class.date-filled]="agenteForm.get('dataNascita')?.value" required>
          <label for="dataNascita" class="input-label">Data di Nascita</label>
        </div>
          
        <div formGroupName="indirizzo">
          <div class="input-container">
            <input type="text" class="input-field" formControlName="citta" required>
            <label for="citta" class="input-label">Città</label>
          </div>

          <div class="input-container">
            <input type="text" class="input-field" formControlName="via" required>
            <label for="via" class="input-label">Via</label>
          </div>

          <div class="input-container">
            <input type="number" class="input-field" formControlName="num_civico" required>
            <label for="numeroCivico" class="input-label">Numero Civico</label>
          </div>
        </div>

        <div class="input-container">
          <input type="text" class="input-field" formControlName="codiceFiscale" required>
          <label for="codiceFiscale" class="input-label">Codice Fiscale</label>
        </div>

        <div class="input-container">
          <div class="radio-row">
            <label class="radio-label">Genere:</label>
            <div class="radio-group">
              <label>
                <input type="radio" formControlName="genere" value="M" /> Maschio
              </label>
              <label>
                <input type="radio" formControlName="genere" value="F" /> Femmina
              </label>
            </div>
          </div>
        </div>

        <div class="input-container">
          <input type="email" class="input-field" formControlName="email" required>
          <label for="email" class="input-label">Email</label>
        </div>
          
        <div class="input-container">
          <input type="password" class="input-field" formControlName="password" required>
          <label for="password" class="input-label">Password</label>
        </div>

        <button type="submit" class="confirm-button" [disabled]="agenteForm.invalid">Conferma</button>
      </form>
    </div>
  </div>
</modal-profile>

<pop-up-component [popUp]="popUpData" />
