<div class="offer-button" (click)="openOffer()">
    <div class="icon-container">
      <img src="/profile/offer.png" alt="offerta" class="icon" />
    </div>
    <div class="text-container">
      <h3>Offerte</h3>
      <p>Consulta le ultime offerte effettuate</p>
    </div>
</div>
  
<modal-profile [isOpen]="showOffer" (close)="closeOffer()" popUpName="Le tue offerte">
  <div class="extern-offers-div">
    <offers-component [offerteImmobili]="offerteImmobile"/>
  </div>
</modal-profile>
